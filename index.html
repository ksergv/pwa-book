<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Библиотека</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.book{
background:#222;
padding:15px;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
}

.book:hover{
background:#333;
}

</style>

</head>

<body>

<h1>Библиотека</h1>

<div class="book" onclick="openBook('ifrit')">
📖 Создание Ифрита
</div>

<div class="book" onclick="openBook('alchemy')">
📖 Алхимия
</div>

<div class="book" onclick="openBook('magic')">
📖 Магия
</div>

<script>

function openBook(book){

location.href="reader.html?book="+book;

}

</script>

</body>
</html>
